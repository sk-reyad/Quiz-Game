<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="./assets/logo.png" width="50px" />

  <title>Quiz Game</title>

  <link rel="stylesheet" href="style.css" />

  <link
    href="https://fonts.googleapis.com/css?family=Poppins:100,100italic,200,200italic,300,300italic,regular,italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css?family=Mulish:200,300,regular,500,600,700,800,900,200italic,300italic,italic,500italic,600italic,700italic,800italic,900italic"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css?family=Bebas+Neue:regular" rel="stylesheet" />
</head>

  <body>
    <div class="container">
      <div class="screen active" id="start-screen">
        <h1>Quiz Time!</h1>
        <p>Test your knowledge with these questions</p>
        <button id="start-btn">Start Quiz</button>
      </div>

      <div class="screen" id="quiz-screen">
        <div class="quiz-header">

          <h2 id="question-text">Question goes here</h2>

          <div class="quiz-info">
            <p>
              Question <span id="current-question">1</span> of <span id="total-questions">10</span>
            </p>

            <p>
              Score: <span id="score">0</span>
            </p>
          </div>
        </div>

        <div class="answers-container" id="answers-container">
          <!-- Answer buttons will be inserted here from JS -->
        </div>

        <div class="progress-bar">
          <div class="progress" id="progress"></div>
        </div>
      </div>

      <div class="screen" id="result-screen">
        <h1>Quiz Results</h1>
        <div class="results-info">
          <p>You scored <span id="final-score">0</span> out of <span id="max-score">10</span></p>
          <div id="result-message">Good Job!</div>
          <button id="restart-btn">Restart Quiz</button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
